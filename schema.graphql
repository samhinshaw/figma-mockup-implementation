# Sample schema for the Dashboard. There is no live backend yet — this exists
# so `pnpm codegen` can produce typed operations offline. Replace it (or point
# codegen.ts at a real endpoint URL) once a backend exists.

scalar DateTime

type Query {
  dashboardStats: DashboardStats!
  projects: [Project!]!
  salesOverview: [TimeseriesPoint!]!
}

"""Headline metrics shown in the dashboard stat cards."""
type DashboardStats {
  websiteViews: Int!
  dailySales: Float!
  completedTasks: Int!
}

"""A row in the Projects table."""
type Project {
  id: ID!
  name: String!
  members: [Member!]!
  budget: Float!
  completion: Float! # 0–100
}

type Member {
  id: ID!
  name: String!
  avatarUrl: String
}

"""A single point in a time-series chart (e.g. Sales Overview)."""
type TimeseriesPoint {
  label: String!
  value: Float!
}
