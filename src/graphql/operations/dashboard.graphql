# Sample operation so codegen produces typed output. Add real operations here
# (or co-locate them in .ts files using the generated `graphql()` function).

query DashboardOverview {
  dashboardStats {
    websiteViews
    dailySales
    completedTasks
  }
  projects {
    id
    name
    budget
    completion
    members {
      id
      name
      avatarUrl
    }
  }
  salesOverview {
    label
    value
  }
}
